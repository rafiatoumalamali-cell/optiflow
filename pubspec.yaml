name: optiflow
description: "OptiFlow - Smart Business Optimizer for West Africa"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  signature: ^5.4.0

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_analytics: ^11.0.0
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.2

  # State Management
  provider: ^6.1.1

  # Local Database (Offline Storage)
  sqflite: ^2.3.0
  path_provider: ^2.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # Utilities
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  http: ^1.1.0
  shared_preferences: ^2.2.0
  flutter_native_splash: ^2.3.8
  flutter_launcher_icons: ^0.13.1
  url_launcher: ^6.2.1

  # Export & Sharing
  pdf: ^3.10.0
  printing: ^5.11.0
  share_plus: ^7.2.0

  # Security
  crypto: ^3.0.3

  # Background Tasks
  workmanager: ^0.6.0
  flutter_local_notifications: ^21.0.0
  uuid: ^4.5.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
